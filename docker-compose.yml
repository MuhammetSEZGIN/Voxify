version: '3.8'

services:
  # 1. PostgreSQL - Clan Service İçin
  clanservice-db:
    image: postgres:latest
    container_name: clanservice-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: clanservicedb
    ports:
      - "5432:5432"
    volumes:
      - clan_pg_data:/var/lib/postgresql

  # 2. PostgreSQL - Identity Service İçin
  identity-db:
    image: postgres:latest
    container_name: identity-postgres
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: IdentityDb
    ports:
      - "5433:5432"
    volumes:
      - identity_pg_data:/var/lib/postgresql

  # 3. MongoDB - Message Service İçin
  message-db:
    image: mongo:latest
    container_name: message-mongodb
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: 1234
    ports:
      - "27017:27017"
    volumes:
      - message_mongo_data:/data/db

  # ---------------- YENİ EKLENENLER ---------------- #

  # 4. Redis - LiveKit'in Hızlı Bellek Yönetimi İçin
  livekit-redis:
    image: redis:7-alpine
    container_name: livekit-redis
    restart: always
    ports:
      - "6379:6379"

# 5. LiveKit Server - Ses ve Video SFU
# 5. LiveKit Server
  livekit-server:
    image: livekit/livekit-server:latest
    container_name: livekit-server
    restart: always
    # Komutu biraz detaylandıralım: hem dev modu hem de dışarıya kapıları açalım
    command: ["--dev", "--node-ip", "25.21.121.153"] 
    environment:
      LIVEKIT_KEYS: "devkey: secret"
      REDIS_HOST: "livekit-redis:6379"
      # Bazı sürümlerde env var olarak NODE_IP yeterli olmayabilir, o yüzden komuta da ekledik
      NODE_IP: "25.21.121.153"
    ports:
      - "7880:7880"      # HTTP API / Signaling
      - "7881:7881"      # WebRTC over TCP
      - "7882:7882/udp"  # WebRTC over UDP (Asıl ses verisi)
    depends_on:
      - livekit-redis
    # Eğer Linux kullanıyorsan aşağıdaki satırı aktif etmek Hamachi için en garantisidir
    # network_mode: "host" 
    # Not: Windows kullanıyorsan ports: kısmını kullanmaya devam et.

volumes:
  clan_pg_data:
  identity_pg_data:
  message_mongo_data: