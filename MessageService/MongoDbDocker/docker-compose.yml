services:
    mongo:
        image: mongo:latest
        container_name: my-mongodb
        ports:
            - "27017:27017"
        volumes:
            - mongodb_data:/data/db
        environment:
            - MONGO_INITDB_ROOT_USERNAME=root
            - MONGO_INITDB_ROOT_PASSWORD=1234
            - MONGO_INITDB_DATABASE=messageservicedb
        networks:
            - app-network
        
    mongo-express:
        image: mongo-express
        container_name: my-mongo-express
        ports:
            - "8081:8081"
        environment:
            - ME_CONFIG_MONGODB_SERVER=mongo
            - ME_CONFIG_MONGODB_ADMINUSERNAME=root
            - ME_CONFIG_MONGODB_ADMINPASSWORD=1234
        depends_on:
            - mongo
        networks:
            - app-network

volumes:
    mongodb_data:
        driver: local
networks:
    app-network:
        driver: bridge
      
            