name: Deploy to Production

on:
  push:
    branches: [main]

env:
  DOTNET_VERSION: '9.0.x'

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore & Test ClanService
        run: dotnet test ClanService/ClanServiceTest/ClanServiceTest.csproj --verbosity minimal

      - name: Restore & Test IdentityService
        run: dotnet test IdentityService/IdentityServiceTests/IdentityServiceTests.csproj --verbosity minimal
        continue-on-error: true  # pre-existing failures

  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/Sesver
            git pull origin main
            docker compose down
            docker compose up -d --build
            docker image prune -f
